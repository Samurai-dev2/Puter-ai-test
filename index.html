<!doctype html>
<html>
  <body>
    <!-- Puter client -->
    <script src="https://js.puter.com/v2/"></script>

    <!-- Dynamic style container (CSS will be generated & inserted here) -->
    <style id="dynamic-css"></style>

    <div style="padding: 16px; max-width: 900px; margin: 0 auto;">
      <h2 class="title">AI Chat</h2>

      <textarea id="userInput" rows="3" style="width: 100%; padding: 10px;"></textarea>

      <button id="goBtn" style="margin-top: 10px; padding: 10px 14px;">
        Generate + Chat
      </button>

      <div id="output" style="margin-top: 14px;"></div>
    </div>

    <script>
      const userInputEl = document.getElementById("userInput");
      const outputEl = document.getElementById("output");
      const goBtn = document.getElementById("goBtn");
      const cssEl = document.getElementById("dynamic-css");

      function escapeHtml(str) {
        return (str ?? "").replace(/[&<>"']/g, (c) => {
          const map = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" };
          return map[c] || c;
        });
      }

      function extractText(res) {
        return (
          res?.message?.content?.[0]?.text ??
          res?.text ??
          (typeof res === "string" ? res : JSON.stringify(res))
        );
      }

      async function generateCssFromInput(userText) {
        const cssPrompt = `
Return ONLY raw CSS (no markdown, no \`\`\` blocks, no <style> tag) that styles this page:
- body
- .title
- textarea
- button
- #output
Use a theme that matches the tone/intent of this user input:
"${userText}"

Constraints:
- Keep it safe and simple (colors, fonts, spacing, borders).
- Do not use external resources (no @import, no URLs).
`.trim();

        const cssResp = await puter.ai.chat(cssPrompt, { model: "claude-sonnet-4.5" });
        const cssText = extractText(cssResp);

        return cssText;
      }

      goBtn.onclick = async () => {
        outputEl.innerHTML = "";
        goBtn.disabled = true;

        try {
          const userText = (userInputEl.value || "").trim();
          if (!userText) {
            outputEl.innerHTML = `<p style="color:red;">Please type something first.</p>`;
            return;
          }

          // 1) Generate CSS based on the user's input
          cssEl.textContent = await generateCssFromInput(userText);

          // 2) Chat with streaming
          const chatStream = await puter.ai.chat(userText, {
            model: "claude-sonnet-4.5",
            stream: true
          });

          outputEl.innerHTML += `<div class="title">Claude Sonnet 4.5:</div>`;

          for await (const part of chatStream) {
            const chunk = escapeHtml(part?.text);
            outputEl.innerHTML += chunk.replaceAll("\n", "<br>");
          }
        } catch (e) {
          outputEl.innerHTML = `<p style="color:red;">Error: ${escapeHtml(e?.message || String(e))}</p>`;
          console.error(e);
        } finally {
          goBtn.disabled = false;
        }
      };
    </script>
  </body>
</html>
